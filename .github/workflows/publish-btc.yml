name: publish-btc
on:
  # 発火は外部cron(cron-job.org)からのworkflow_dispatchに一本化。
  # GitHub schedule cronは遅延・スキップが直せないため廃止した（2026-06-14）。
  workflow_dispatch: {}

permissions:
  contents: write

# 6h実行が万一重なっても main を競合させない
concurrency:
  group: publish-btc
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Generate article
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SANTIMENT_API_KEY: ${{ secrets.SANTIMENT_API_KEY }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: npx tsx pipeline/run.ts btc
      - name: Commit & push to main
        run: |
          # Vercel Hobby はコミット作者がアカウント所有者でないとデプロイを拒否するため、
          # オーナー本人の identity でコミットする（bot メールだと Blocked になる）
          git config user.name "KEISUKE-MYPC"
          git config user.email "keisukematsu0820@gmail.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "publish: 6h分析 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') (auto)"
          git pull --rebase origin main
          git push origin HEAD:main
