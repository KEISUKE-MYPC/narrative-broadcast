name: publish-btc
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

# 6h実行が万一重なっても main を競合させない
concurrency:
  group: publish-btc
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Generate article
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          SANTIMENT_API_KEY: ${{ secrets.SANTIMENT_API_KEY }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: npx tsx pipeline/run.ts btc
      - name: Commit & push to main
        run: |
          git config user.name "narrative-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "publish: 6h分析 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') (auto)"
          git pull --rebase origin main
          git push origin HEAD:main
